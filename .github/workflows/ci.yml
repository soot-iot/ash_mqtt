name: Integration

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  integration:
    name: Integration (${{ matrix.broker }})
    runs-on: ubuntu-latest
    env:
      MIX_ENV: test
      MQTT_BROKER: ${{ matrix.broker }}
    strategy:
      fail-fast: false
      matrix:
        broker: [emqx, mosquitto]
    steps:
      - uses: actions/checkout@v4
      - uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.18.4"
          otp-version: "28.3.2"
      - name: Cache deps and build
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-${{ hashFiles('mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-
      - run: mix deps.get
      - name: Start MQTT broker
        run: docker compose -f docker/docker-compose.yml up -d --wait ${{ matrix.broker }}
      - run: mix test --only integration
      - name: Broker logs on failure
        if: failure()
        run: docker compose -f docker/docker-compose.yml logs ${{ matrix.broker }}
