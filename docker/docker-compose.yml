services:
  emqx:
    image: emqx/emqx:5.8.0
    container_name: ash_mqtt_emqx
    ports:
      - "${MQTT_EMQX_PORT:-1883}:1883"
    environment:
      EMQX_ALLOW_ANONYMOUS: "true"
      EMQX_LOG__CONSOLE_HANDLER__LEVEL: warning
    healthcheck:
      test: ["CMD", "/opt/emqx/bin/emqx", "ctl", "status"]
      interval: 5s
      timeout: 5s
      retries: 20

  mosquitto:
    image: eclipse-mosquitto:2.0
    container_name: ash_mqtt_mosquitto
    ports:
      - "${MQTT_MOSQUITTO_PORT:-1884}:1883"
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
